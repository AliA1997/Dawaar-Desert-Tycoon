kind = "mobile"
previewPath = "/"
title = "Dawaar - Middle East Monopoly"
version = "1.0.0"
id = "artifacts/dawaar"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 24700
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dawaar run dev"

[services.env]
PORT = "24700"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dawaar", "run", "build"]
run = ["pnpm", "--filter", "@workspace/dawaar", "run", "serve"]
